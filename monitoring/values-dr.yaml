# =============================================================================
# kube-prometheus-stack values — DR (Azure AKS)
# =============================================================================

fullnameOverride: "monitoring"

# =============================================================================
# GRAFANA
# =============================================================================
grafana:
  enabled: true
  adminPassword: "admin@123"

  # Azure uses LoadBalancer with public IP (not hostname like AWS)
  service:
    type: LoadBalancer
    port: 80

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "Retail Store DR"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
      nginx-ingress:
        gnetId: 9614
        revision: 1
        datasource: Prometheus

# =============================================================================
# PROMETHEUS
# =============================================================================
prometheus:
  enabled: true
  service:
    type: ClusterIP

  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# =============================================================================
# ALERTMANAGER
# =============================================================================
alertmanager:
  enabled: true
  service:
    type: ClusterIP
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

# =============================================================================
# NODE EXPORTER & KUBE STATE METRICS
# =============================================================================
prometheus-node-exporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi

kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# =============================================================================
# ADDITIONAL SCRAPE CONFIGS — DR services
# =============================================================================
additionalScrapeConfigs:
  - job_name: retail-store-dr-services
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - retail-store-dr
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
